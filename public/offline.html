<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión — Git Guía Equipo</title>
  <style>
    /* ── Variables ──────────────────────────────────────────── */
    :root {
      --bg: #0e0e11;
      --surface: #16161a;
      --surface2: #1c1c22;
      --border: #2a2a35;
      --accent: #7c6af7;
      --text: #e8e8f0;
      --muted: #7a7a90;
      --sidebar-w: 264px;
      --warn: #f0a040;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    [hidden] { display: none !important; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.7;
    }

    /* ── Topbar móvil ───────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 14px;
      z-index: 400;
    }
    @media (min-width: 1024px) { .topbar { display: none; } }

    .topbar-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      flex: 1;
    }

    /* Botón hamburguesa */
    .menu-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      background: transparent;
      border: none;
      color: var(--text);
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.15s;
    }
    .menu-toggle:hover { background: rgba(255,255,255,0.05); }
    .menu-toggle .icon-close { display: none; }
    .menu-toggle.is-open .icon-hamburger { display: none; }
    .menu-toggle.is-open .icon-close { display: block; }

    /* ── Overlay ─────────────────────────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
      z-index: 250;
    }
    .overlay.is-visible {
      opacity: 1;
      visibility: visible;
    }

    /* ── Offline pill ───────────────────────────────────────── */
    .offline-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--warn);
      background: rgba(240,160,64,.1);
      border: 1px solid rgba(240,160,64,.28);
      border-radius: 20px;
      padding: 3px 10px 3px 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .offline-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--warn);
      animation: blink 1.6s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Layout ─────────────────────────────────────────────── */
    .layout {
      display: flex;
      min-height: 100%;
    }

    /* ── Sidebar (desktop) ──────────────────────────────────── */
    .sidebar {
      display: none;
    }
    @media (min-width: 1024px) {
      .sidebar {
        display: flex;
        flex-direction: column;
        width: var(--sidebar-w);
        flex-shrink: 0;
        position: fixed;
        top: 0; left: 0; bottom: 0;
        background: var(--surface);
        border-right: 1px solid var(--border);
        overflow-y: auto;
        z-index: 200;
      }
    }

    .sidebar-head {
      padding: 22px 20px 18px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sidebar-home-link {
      text-decoration: none;
      display: block;
    }
    .sidebar-badge {
      display: inline-block;
      font-family: monospace;
      font-size: 10px;
      letter-spacing: .12em;
      color: var(--accent);
      background: rgba(124,106,247,.1);
      border: 1px solid rgba(124,106,247,.22);
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 10px;
    }
    .sidebar-title {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }
    .sidebar-title span {
      display: block;
      color: var(--muted);
      font-weight: 400;
      font-size: 12px;
      margin-top: 2px;
    }
    .sidebar-offline-pill {
      margin-top: 12px;
    }

    .sidebar-nav {
      flex: 1;
      padding: 16px 10px;
      overflow-y: auto;
    }
    .nav-group { margin-bottom: 22px; }
    .nav-group-label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 8px;
      margin-bottom: 5px;
    }
    .nav-list { list-style: none; display: flex; flex-direction: column; gap: 1px; }

    .nav-link {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-radius: 7px;
      text-decoration: none;
      color: #9090aa;
      font-size: 13px;
      transition: background .14s, color .14s;
    }
    .nav-link:hover { background: rgba(255,255,255,.05); color: var(--text); }
    .nav-link.is-active {
      background: rgba(124,106,247,.12);
      color: var(--accent);
    }
    .nav-link.is-cached { color: #c0c0d8; }

    .nav-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .cached-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: #4ecdc4;
      flex-shrink: 0;
      margin-left: 6px;
      opacity: 0;
      transition: opacity .2s;
    }
    .nav-link.is-cached .cached-dot { opacity: 1; }

    .sidebar-foot {
      display: none;
    }

    /* ── Mobile Menu (panel deslizable) ─────────────────────── */
    .mobile-menu {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 280px;
      max-width: 85vw;
      background: var(--surface);
      border-right: 1px solid var(--border);
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      z-index: 300;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .mobile-menu.is-open {
      transform: translateX(0);
    }
    @media (min-width: 1024px) { .mobile-menu { display: none; } }

    .mobile-menu-head {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .mobile-menu-nav {
      flex: 1;
      padding: 12px 10px;
    }
    .mobile-menu-foot {
      display: none;
    }

    /* ── Contenido principal ─────────────────────────────────── */
    .page-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px 40px;
      min-height: 100vh;
    }
    @media (min-width: 1024px) {
      .page-wrapper {
        margin-left: var(--sidebar-w);
        padding: 40px 24px;
      }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .card-icon { font-size: 3rem; display: block; margin-bottom: 20px; }

    .card-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 12px;
    }

    .card-desc {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .card-desc strong { color: #b0b0c8; font-weight: 500; }

    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.18s;
    }
    .btn:hover { filter: brightness(1.12); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface2); border: 1px solid var(--border); color: #b0b0c8; }

    /* ── Toast ───────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 500;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .toast.is-visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast-icon { font-size: 16px; }

    /* Spinner para botón */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
  </style>
</head>
<body>

  <!-- Overlay para cerrar menú -->
  <div class="overlay" id="overlay"></div>

  <!-- Toast de feedback -->
  <div class="toast" id="toast">
    <span class="toast-icon">📡</span>
    <span id="toast-message">Aún sin conexión</span>
  </div>

  <!-- Topbar (solo móvil) -->
  <div class="topbar">
    <button class="menu-toggle" id="menuToggle" aria-label="Abrir menú" aria-expanded="false">
      <svg class="icon-hamburger" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
      <svg class="icon-close" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>
    <span class="topbar-title">Git Guía</span>
    <div class="offline-pill">
      <span class="offline-dot"></span>Sin conexión
    </div>
  </div>

  <!-- Menú móvil (panel deslizable) -->
  <aside class="mobile-menu" id="mobileMenu" aria-label="Menú de navegación">
    <div class="mobile-menu-head">
      <a href="/git-guia-equipo-astro/" class="sidebar-home-link">
        <span class="sidebar-badge">v3.0</span>
        <p class="sidebar-title">Git Guía <span>del Equipo</span></p>
      </a>
      <div class="offline-pill sidebar-offline-pill" style="margin-top:10px;">
        <span class="offline-dot"></span>Sin conexión
      </div>
    </div>

    <nav class="mobile-menu-nav" id="mobile-nav">
      <!-- Secciones se insertan por JS -->
    </nav>

    <div class="mobile-menu-foot"></div>
  </aside>

  <div class="layout">

    <!-- Sidebar (solo desktop) -->
    <aside class="sidebar">
      <div class="sidebar-head">
        <a href="/git-guia-equipo-astro/" class="sidebar-home-link">
          <span class="sidebar-badge">v3.0</span>
          <p class="sidebar-title">Git Guía <span>del Equipo</span></p>
        </a>
        <div class="offline-pill sidebar-offline-pill">
          <span class="offline-dot"></span>Sin conexión
        </div>
      </div>

      <nav class="sidebar-nav" id="desktop-nav">
        <!-- Secciones se insertan por JS -->
      </nav>

      <div class="sidebar-foot"></div>
    </aside>

    <!-- Contenido -->
    <div class="page-wrapper">
      <div class="card">
        <span class="card-icon" aria-hidden="true">📡</span>
        <h1 class="card-title">Sin conexión</h1>
        <p class="card-desc">
          No se puede acceder a esta sección sin conexión a internet.<br>
          <strong>Las páginas visitadas previamente</strong> están disponibles en el menú.
        </p>
        <div class="actions">
          <button id="retryBtn" class="btn btn-primary">
            <span id="retry-icon">↻</span>
            <span id="retry-text">Reintentar conexión</span>
          </button>
          <a href="/git-guia-equipo-astro/" class="btn btn-secondary">← Ir al inicio</a>
        </div>
      </div>
    </div>

  </div>

  <script>
    const BASE = '/git-guia-equipo-astro';

    const SECTIONS = [
      { group: 'Ramas', items: [
        { href: BASE + '/estructura-de-ramas/', title: 'Estructura de Ramas' },
        { href: BASE + '/workitems-y-ramas/', title: 'Workitems y Ramas' },
        { href: BASE + '/nombrado-de-ramas/', title: 'Nombrado de Ramas' },
      ]},
      { group: 'Flujo de Trabajo', items: [
        { href: BASE + '/flujo-diario/', title: 'Flujo de Trabajo Diario' },
        { href: BASE + '/merge-como-estrategia/', title: 'Merge como Estrategia' },
      ]},
      { group: 'Commits y PRs', items: [
        { href: BASE + '/commits/', title: 'Commits' },
        { href: BASE + '/pull-requests/', title: 'Pull Requests' },
        { href: BASE + '/merge-strategy/', title: 'Merge Strategy' },
        { href: BASE + '/draft-prs/', title: 'Draft PRs' },
      ]},
      { group: 'Releases', items: [
        { href: BASE + '/versionado-y-tags/', title: 'Versionado y Tags' },
        { href: BASE + '/hotfix/', title: 'Flujo HotFix' },
      ]},
      { group: 'Calidad', items: [
        { href: BASE + '/cicd-branch-protection/', title: 'CI/CD y Branch Protection' },
        { href: BASE + '/code-review/', title: 'Code Review' },
        { href: BASE + '/reglas-generales/', title: 'Reglas Generales' },
        { href: BASE + '/gitignore/', title: 'Gitignore' },
        { href: BASE + '/trazabilidad-testing/', title: 'Trazabilidad de Testing' },
      ]},
    ];

    // Construir navegación
    function buildNav(container, isMobile) {
      SECTIONS.forEach(group => {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'nav-group';

        const label = document.createElement('span');
        label.className = 'nav-group-label';
        label.textContent = group.group;
        groupDiv.appendChild(label);

        const list = document.createElement('ul');
        list.className = 'nav-list';

        group.items.forEach(item => {
          const li = document.createElement('li');
          const link = document.createElement('a');
          link.href = item.href;
          link.className = 'nav-link';
          link.setAttribute('data-href', item.href);
          link.innerHTML = `<span class="nav-text">${item.title}</span><span class="cached-dot"></span>`;

          // Cerrar menú al hacer click en móvil
          if (isMobile) {
            link.addEventListener('click', closeMenu);
          }

          li.appendChild(link);
          list.appendChild(li);
        });

        groupDiv.appendChild(list);
        container.appendChild(groupDiv);
      });
    }

    buildNav(document.getElementById('desktop-nav'), false);
    buildNav(document.getElementById('mobile-nav'), true);

    // Marcar enlace activo
    const current = location.pathname.replace(/\/$/, '') + '/';
    document.querySelectorAll('.nav-link[data-href]').forEach(el => {
      if (el.getAttribute('data-href') === current) {
        el.classList.add('is-active');
      }
    });

    // Verificar qué secciones están en caché
    async function markCachedSections() {
      if (!('caches' in window)) return;
      // Intentar con el cache actual (v4) y versiones anteriores
      const cacheNames = ['git-guia-v4', 'git-guia-v3', 'git-guia-v2'];
      let cache = null;
      for (const name of cacheNames) {
        cache = await caches.open(name).catch(() => null);
        if (cache) break;
      }
      if (!cache) return;

      const allLinks = document.querySelectorAll('.nav-link[data-href]');
      for (const link of allLinks) {
        const href = link.getAttribute('data-href');
        const hit = await cache.match(href).catch(() => null);
        if (hit) link.classList.add('is-cached');
      }
    }
    markCachedSections();

    // ── Menú móvil toggle ──────────────────────────────────────
    const menuToggle = document.getElementById('menuToggle');
    const mobileMenu = document.getElementById('mobileMenu');
    const overlay = document.getElementById('overlay');

    function openMenu() {
      mobileMenu.classList.add('is-open');
      overlay.classList.add('is-visible');
      menuToggle.classList.add('is-open');
      menuToggle.setAttribute('aria-expanded', 'true');
      document.body.style.overflow = 'hidden';
    }

    function closeMenu() {
      mobileMenu.classList.remove('is-open');
      overlay.classList.remove('is-visible');
      menuToggle.classList.remove('is-open');
      menuToggle.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';
    }

    menuToggle.addEventListener('click', () => {
      mobileMenu.classList.contains('is-open') ? closeMenu() : openMenu();
    });
    overlay.addEventListener('click', closeMenu);

    // Cerrar con Escape
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && mobileMenu.classList.contains('is-open')) {
        closeMenu();
      }
    });

    // ── Botón reintentar conexión ──────────────────────────────
    const retryBtn = document.getElementById('retryBtn');
    const retryIcon = document.getElementById('retry-icon');
    const retryText = document.getElementById('retry-text');
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toast-message');

    function showToast(message, icon = '📡') {
      toastMessage.textContent = message;
      toast.querySelector('.toast-icon').textContent = icon;
      toast.classList.add('is-visible');
      setTimeout(() => toast.classList.remove('is-visible'), 3000);
    }

    retryBtn.addEventListener('click', async () => {
      // Mostrar estado de carga
      retryIcon.innerHTML = '<div class="spinner"></div>';
      retryText.textContent = 'Verificando...';
      retryBtn.disabled = true;

      try {
        // Intentar fetch con timeout de 2 segundos
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 2000);

        const response = await fetch(BASE + '/', {
          signal: controller.signal,
          cache: 'no-store'
        });

        clearTimeout(timeoutId);

        if (response.ok) {
          // Hay conexión - recargar página actual
          retryText.textContent = '¡Conectado! Recargando...';
          location.reload();
        } else {
          throw new Error('Network error');
        }
      } catch (err) {
        // Sin conexión - mostrar toast
        retryIcon.textContent = '↻';
        retryText.textContent = 'Reintentar conexión';
        retryBtn.disabled = false;
        showToast('Aún sin conexión a internet', '📡');
      }
    });
  </script>
</body>
</html>
